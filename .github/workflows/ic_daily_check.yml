name: SPY 0DTE IC Daily Signal Check

# Runs DAILY POST-CLOSE (yfinance daily bar only finalizes after EOD).
# 21:30 UTC = 17:30 EDT / 16:30 EST — safely after 16:00 ET close in both seasons.
# Confirms today's score for the audit trail in PAPER_TRADE_LOG.md.
# For LIVE 10:30 ET entry signals, use Pine v3-0 on TradingView chart (realtime).
on:
  workflow_dispatch:  # manual trigger from GitHub UI
  schedule:
    - cron: '30 21 * * 1-5'  # 17:30 EDT / 16:30 EST, Mon-Fri

jobs:
  check-ic-signal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy scipy pytz requests

      - name: Run IC signal check
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          SLACK_WEBHOOK:   ${{ secrets.SLACK_WEBHOOK }}
          WEBHOOK_URL:     ${{ secrets.WEBHOOK_URL }}
        run: python check_ic_signal.py

      - name: Commit log update
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ic_signal_log.csv
          git diff --cached --quiet || git commit -m "log: IC signal check $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || echo "No changes to push"
