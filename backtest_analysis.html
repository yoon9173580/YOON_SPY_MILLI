<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MES Futures Backtest Analysis</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#06070b;--surface:rgba(16,18,27,0.9);--surface2:rgba(22,25,38,0.95);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --muted:#6b7084;--text:#e4e6ef;
  --green:#00e87b;--red:#ff4d6a;--yellow:#ffb627;--blue:#5b8cff;
  --purple:#a78bfa;--cyan:#22d3ee;--orange:#fb923c;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:"Inter",system-ui,sans-serif;min-height:100vh}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(circle at 25% 20%,rgba(91,140,255,0.05) 0%,transparent 50%),
             radial-gradient(circle at 75% 80%,rgba(0,232,123,0.03) 0%,transparent 50%);
  pointer-events:none;z-index:0}
.wrap{max-width:1280px;margin:0 auto;padding:1.5rem;position:relative;z-index:1}

/* Header */
.header{text-align:center;margin-bottom:2rem}
.header h1{font-size:1.8rem;font-weight:800;letter-spacing:-0.5px;
  background:linear-gradient(135deg,#5b8cff,#00e87b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--muted);font-size:0.85rem;margin-top:0.4rem}
.badge{display:inline-block;background:rgba(91,140,255,0.15);border:1px solid rgba(91,140,255,0.3);
  color:#5b8cff;border-radius:20px;padding:0.2rem 0.8rem;font-size:0.72rem;margin-top:0.5rem}

/* Cards Row */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0.8rem;margin-bottom:1.5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1rem 1.2rem;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0}
.card.green::before{background:var(--green)}
.card.red::before{background:var(--red)}
.card.blue::before{background:var(--blue)}
.card.purple::before{background:var(--purple)}
.card.yellow::before{background:var(--yellow)}
.card.cyan::before{background:var(--cyan)}
.card.orange::before{background:var(--orange)}
.card-label{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.4rem}
.card-value{font-size:1.6rem;font-weight:800;letter-spacing:-1px;line-height:1}
.card-sub{font-size:0.72rem;color:var(--muted);margin-top:0.3rem}

/* Chart containers */
.chart-section{margin-bottom:1.5rem}
.chart-section h2{font-size:0.9rem;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:0.08em;margin-bottom:0.8rem;padding-left:0.2rem}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.2rem}
.chart-box canvas{max-height:280px}

/* Grid layouts */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.grid-2-1{display:grid;grid-template-columns:2fr 1fr;gap:1rem}

@media(max-width:768px){
  .grid-2,.grid-3,.grid-2-1{grid-template-columns:1fr}
  .cards{grid-template-columns:repeat(2,1fr)}
  .card-value{font-size:1.3rem}
}

/* Trade table */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.table-scroll{overflow-x:auto;max-height:400px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:0.78rem}
thead th{background:rgba(255,255,255,0.03);padding:0.6rem 0.8rem;text-align:left;
  font-size:0.65rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;
  position:sticky;top:0;z-index:2;border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.03);transition:background 0.15s}
tbody tr:hover{background:rgba(255,255,255,0.03)}
td{padding:0.5rem 0.8rem;white-space:nowrap}
.pnl-pos{color:var(--green);font-weight:600}
.pnl-neg{color:var(--red);font-weight:600}
.badge-sm{display:inline-block;padding:0.1rem 0.45rem;border-radius:8px;font-size:0.65rem;font-weight:700}
.dir-long{background:rgba(0,232,123,0.15);color:var(--green)}
.dir-short{background:rgba(255,77,106,0.15);color:var(--red)}
.exit-eod{background:rgba(91,140,255,0.15);color:var(--blue)}
.exit-sl{background:rgba(255,77,106,0.15);color:var(--red)}
.exit-trail{background:rgba(34,211,238,0.15);color:var(--cyan)}
.exit-be{background:rgba(255,182,39,0.15);color:var(--yellow)}

/* Section separator */
.sep{border:none;border-top:1px solid var(--border);margin:1rem 0}

/* Stats mini-table */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:0.45rem 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.stat-row:last-child{border-bottom:none}
.stat-name{font-size:0.75rem;color:var(--muted)}
.stat-val{font-size:0.82rem;font-weight:700}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>MES Futures Backtest Analysis</h1>
    <p>Micro E-mini S&amp;P 500 · Pro Strategy v5 (Dual-Window, MODERATE grade, ATR+NR7+Kelly)</p>
    <span class="badge">2023-03-25 ~ 2026-03-25 · $500K Starting Capital</span>

  <!-- Summary Cards -->
  <div class="cards" id="summary-cards"></div>

  <div class="chart-section">

      <div class="chart-box"><canvas id="ddChart"></canvas></div>

      <div class="chart-box"><canvas id="dirChart"></canvas></div>
    </div>
  </div>
  <div class="chart-section">
    <div class="grid-2">
      <div class="chart-box"><canvas id="vixChart"></canvas></div>
      <div class="chart-box"><canvas id="scoreChart"></canvas></div>
    </div>
  </div>
  <div class="chart-section">
    <div class="grid-2">
      <div class="chart-box"><canvas id="pnlDistChart"></canvas></div>
      <div class="chart-box">
        <div style="padding:0.4rem 0">

          <div id="yearly-stats"></div>
        </div>
        <hr class="sep">
        <div style="font-size:0.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.8rem;margin-top:0.8rem">등급별 성과</div>
        <div id="grade-stats"></div>
        <hr class="sep">
        <div style="font-size:0.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.8rem;margin-top:0.8rem">리스크 지표</div>
        <div id="risk-stats"></div>
      </div>
    </div>
  </div>

  <!-- Trade Log -->
  <div class="chart-section">
    <h2>거래 내역 (115건)</h2>
    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>#</th><th>날짜</th><th>창구</th><th>등급</th><th>방향</th><th>전략</th><th>진입가</th><th>청산가</th>

            </tr>
          </thead>
          <tbody id="trade-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

const T = RAW.trades;
const SB = RAW.start_balance;

// ── Derived metrics ──
function fmt$(v){return '$'+Math.round(v).toLocaleString()}
function fmtPct(v){return (v>=0?'+':'')+v.toFixed(1)+'%'}
function mean(arr){return arr.reduce((a,b)=>a+b,0)/arr.length}
function std(arr){const m=mean(arr);return Math.sqrt(arr.map(x=>(x-m)**2).reduce((a,b)=>a+b,0)/arr.length)}

// Trade returns (vs prev balance)
const tradeReturns = T.map((t,i)=>{
  const prev = i===0 ? SB : T[i-1].balance;
  return t.pnl / prev;
});

// Per-trade annualization: trading days / total trades → sqrt(252/daysPerTrade)
const daysPerTrade = Math.round(RAW.years * 252) / T.length;
const annFactor = Math.sqrt(252 / daysPerTrade);

const rf_per_trade = 0.05 * daysPerTrade / 252;
const excess = tradeReturns.map(r => r - rf_per_trade);
const sharpe = (mean(excess) / std(excess)) * annFactor;

const downExcess = excess.filter(r => r < 0);
const downsideDev = downExcess.length > 0 ? Math.sqrt(downExcess.map(r=>r**2).reduce((a,b)=>a+b,0)/downExcess.length) : 0.0001;
const sortino = (mean(excess) / downsideDev) * annFactor;

const calmar = RAW.annual_return / RAW.max_drawdown;

// Drawdown series
const ddArr = [];
let peak = SB;
T.forEach(t => {
  if(t.balance > peak) peak = t.balance;
  ddArr.push(((peak - t.balance) / peak * 100));
});
const maxDD = Math.max(...ddArr);

// Monthly P&L
const monthly = {};
T.forEach(t => {
  const ym = t.date.slice(0,7);
  monthly[ym] = (monthly[ym]||0) + t.pnl;
});
const months = Object.keys(monthly).sort();
const monthVals = months.map(m=>monthly[m]);

// Yearly P&L
const yearly = {};
T.forEach(t => {
  const y = t.date.slice(0,4);
  yearly[y] = (yearly[y]||0) + t.pnl;
});

const exitCounts = {EOD:0,SL:0,TRAIL:0,BE:0};
T.forEach(t => { exitCounts[t.exit_type] = (exitCounts[t.exit_type]||0)+1; });

// Direction stats
const dirStats = {LONG:{w:0,l:0,pnl:0},SHORT:{w:0,l:0,pnl:0}};
T.forEach(t => {
  const d = t.direction;
  dirStats[d].pnl += t.pnl;
  if(t.pnl > 0) dirStats[d].w++; else dirStats[d].l++;
});

// VIX buckets
const vixBuckets = [
  {label:'<15',min:0,max:15,w:0,l:0},
  {label:'15-18',min:15,max:18,w:0,l:0},
  {label:'18-20',min:18,max:20,w:0,l:0},
  {label:'>20',min:20,max:999,w:0,l:0}
];
T.forEach(t => {
  const b = vixBuckets.find(b=>t.vix>=b.min&&t.vix<b.max);
  if(b){if(t.pnl>0)b.w++;else b.l++;}
});

// Score buckets: grade-based (MODERATE 78-87 vs STRONG 88+)
const scoreBuckets = [
  {label:'78~82',min:78,max:83,w:0,l:0,pnl:0},
  {label:'83~87',min:83,max:88,w:0,l:0,pnl:0},
  {label:'88~92',min:88,max:93,w:0,l:0,pnl:0},
  {label:'93~102',min:93,max:200,w:0,l:0,pnl:0}
];
T.forEach(t => {
  const score = t.boosted_score || t.score;
  const b = scoreBuckets.find(b=>score>=b.min&&score<b.max);
  if(b){if(t.pnl>0)b.w++;else b.l++;b.pnl+=t.pnl;}
});

const bins = [-15000,-10000,-7500,-5000,-2500,0,2500,5000,10000,15000,20000,30000,50000];
const histCounts = new Array(bins.length-1).fill(0);
T.forEach(t => {

  {n:'평균 손실',v:`${fmt$(avgLoss)}`,c:'var(--red)'},
  {n:'R:R 비율',v:(Math.abs(avgWin/avgLoss)).toFixed(2),c:'var(--blue)'},
  {n:'최대 낙폭',v:`-${RAW.max_drawdown}%`,c:'var(--red)'},
  {n:'샤프 비율',v:sharpe.toFixed(2),c:'var(--yellow)'},
  {n:'소르티노',v:sortino.toFixed(2),c:'var(--orange)'},
  {n:'칼마 비율',v:calmar.toFixed(2),c:'var(--cyan)'},
];
const riskEl = document.getElementById('risk-stats');
riskStats.forEach(s=>{
  riskEl.innerHTML += `<div class="stat-row">
    <span class="stat-name">${s.n}</span>
    <span class="stat-val" style="color:${s.c}">${s.v}</span>
  </div>`;
});

// ── Trade Log ──
const tbody = document.getElementById('trade-tbody');
T.forEach((t,i)=>{
  const pnlCls = t.pnl >= 0 ? 'pnl-pos' : 'pnl-neg';
  const pnlStr = (t.pnl >= 0 ? '+' : '') + fmt$(t.pnl);
  const dirCls = t.direction === 'LONG' ? 'dir-long' : 'dir-short';
  const exitCls = t.exit_type==='EOD'?'exit-eod':t.exit_type==='SL'?'exit-sl':t.exit_type==='TRAIL'?'exit-trail':'exit-be';
  const windowCls = t.window==='GAMMA' ? 'dir-short' : 'exit-be';
  const gradeCls = t.grade==='STRONG' ? 'dir-long' : 'exit-eod';
  tbody.innerHTML += `<tr>
    <td style="color:var(--muted)">${i+1}</td>
    <td>${t.date}</td>
    <td><span class="badge-sm ${windowCls}">${t.window||'PRIME'}</span></td>
    <td><span class="badge-sm ${gradeCls}">${t.grade||'-'}</span></td>
    <td><span class="badge-sm ${dirCls}">${t.direction}</span></td>
    <td style="color:var(--muted);font-size:0.7rem">${t.strategy}</td>
    <td>${t.entry_price.toFixed(2)}</td>
    <td>${t.exit_price.toFixed(2)}</td>
    <td><span class="badge-sm ${exitCls}">${t.exit_type}</span></td>
    <td class="${t.point_pnl>=0?'pnl-pos':'pnl-neg'}">${t.point_pnl>=0?'+':''}${t.point_pnl.toFixed(2)}</td>
    <td>${t.contracts}</td>
    <td class="${pnlCls}">${pnlStr}</td>
    <td style="font-size:0.72rem">${fmt$(t.balance)}</td>
    <td style="color:var(--muted)">${t.vix}</td>
    <td style="color:var(--purple)">${t.boosted_score||t.score}<span style="color:var(--muted);font-size:0.65rem"> (${t.score})</span></td>
  </tr>`;
});
</script>
</body>
</html>
